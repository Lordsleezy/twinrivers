<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Twin Rivers</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #0f1117;
  color: #eee;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  color: #ff7b00;
}

/* Login Screen */
.login-screen {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
}

.login-box {
  background: #1c1f2a;
  padding: 40px;
  border-radius: 10px;
  width: 100%;
  max-width: 400px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.login-box h2 {
  margin-bottom: 25px;
  text-align: center;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 6px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.05);
  color: #eee;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
}

.login-box input:focus {
  outline: none;
  border-color: #ff7b00;
}

.login-box button {
  width: 100%;
  background: #ff7b00;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 16px;
  transition: all 0.3s ease;
}

.login-box button:hover {
  background: #ff8c1a;
}

.error-message {
  color: #ff4444;
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
}

/* Dashboard */
.dashboard {
  display: none;
}

.dashboard.active {
  display: block;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.logout-btn {
  background: #ff7b00;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
}

.logout-btn:hover {
  background: #ff8c1a;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-card {
  background: #1c1f2a;
  padding: 20px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  text-align: center;
}

.stat-card h3 {
  font-size: 32px;
  color: #ff7b00;
  margin-bottom: 5px;
}

.stat-card p {
  color: #bbb;
  font-size: 14px;
}

.table-container {
  background: #1c1f2a;
  border-radius: 10px;
  padding: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: rgba(255, 123, 0, 0.1);
}

th {
  padding: 15px;
  text-align: left;
  font-weight: 600;
  color: #ff7b00;
  border-bottom: 2px solid rgba(255, 123, 0, 0.3);
}

td {
  padding: 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

tr:hover {
  background: rgba(255, 255, 255, 0.02);
}

.no-data {
  text-align: center;
  padding: 40px;
  color: #888;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #ff7b00;
}
</style>

<!-- twinrivers-lead-chat:head-start -->
<link rel="stylesheet" href="../assets/lead-chat.css">
<!-- twinrivers-lead-chat:head-end -->
</head>
<body>

<div class="container">
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h2>Admin Login</h2>
      <form id="loginForm">
        <input type="password" id="passwordInput" placeholder="Enter admin password" required>
        <button type="submit">Login</button>
      </form>
      <div id="loginError" class="error-message"></div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard">
    <div class="header">
      <h1>Twin Rivers - Contact Submissions</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <h3 id="totalSubmissions">0</h3>
        <p>Total Submissions</p>
      </div>
      <div class="stat-card">
        <h3 id="todaySubmissions">0</h3>
        <p>Today</p>
      </div>
      <div class="stat-card">
        <h3 id="weekSubmissions">0</h3>
        <p>This Week</p>
      </div>
    </div>

    <div class="table-container">
      <h2 style="margin-bottom: 20px;">All Submissions</h2>
      <div id="tableContent">
        <div class="loading">Loading submissions...</div>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = 'http://localhost:3001';

// Check if already logged in
window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('adminToken');
  if (token) {
    showDashboard();
    loadSubmissions();
  }
});

// Login form handler
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const password = document.getElementById('passwordInput').value;
  const errorDiv = document.getElementById('loginError');
  
  try {
    const response = await fetch(`${API_URL}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    
    const data = await response.json();
    
    if (data.success) {
      localStorage.setItem('adminToken', data.token);
      showDashboard();
      loadSubmissions();
    } else {
      errorDiv.textContent = 'Invalid password';
    }
  } catch (error) {
    errorDiv.textContent = 'Login failed. Please try again.';
    console.error('Login error:', error);
  }
});

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
}

function logout() {
  localStorage.removeItem('adminToken');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('passwordInput').value = '';
}

async function loadSubmissions() {
  const token = localStorage.getItem('adminToken');
  const tableContent = document.getElementById('tableContent');
  
  try {
    const response = await fetch(`${API_URL}/api/submissions`, {
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });
    
    const result = await response.json();
    
    if (!result.success) {
      if (response.status === 401) {
        logout();
        return;
      }
      throw new Error('Failed to load submissions');
    }
    
    const submissions = result.data;
    
    // Update stats
    updateStats(submissions);
    
    // Display table
    if (submissions.length === 0) {
      tableContent.innerHTML = '<div class="no-data">No submissions yet</div>';
    } else {
      tableContent.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Description</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            ${submissions.map(sub => `
              <tr>
                <td>${sub.id}</td>
                <td>${sub.name}</td>
                <td>${sub.phone || 'N/A'}</td>
                <td>${sub.email || 'N/A'}</td>
                <td>${sub.description || 'N/A'}</td>
                <td>${formatDate(sub.timestamp)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
  } catch (error) {
    tableContent.innerHTML = '<div class="no-data">Error loading submissions</div>';
    console.error('Error loading submissions:', error);
  }
}

function updateStats(submissions) {
  const total = submissions.length;
  const today = new Date().toDateString();
  const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
  
  const todayCount = submissions.filter(sub => 
    new Date(sub.timestamp).toDateString() === today
  ).length;
  
  const weekCount = submissions.filter(sub => 
    new Date(sub.timestamp) >= weekAgo
  ).length;
  
  document.getElementById('totalSubmissions').textContent = total;
  document.getElementById('todaySubmissions').textContent = todayCount;
  document.getElementById('weekSubmissions').textContent = weekCount;
}

function formatDate(timestamp) {
  const date = new Date(timestamp);
  return date.toLocaleString('en-US', {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}
</script>

<!-- twinrivers-lead-chat:body-start -->
<form name="lead-chat" method="POST" action="/" data-netlify="true" netlify>
  <input type="hidden" name="form-name" value="lead-chat">
  <p style="display:none;">
    <label>Project Type <input name="project_type"></label>
    <label>City <input name="city"></label>
    <label>Size <input name="size"></label>
    <label>Name <input name="name"></label>
    <label>Phone <input name="phone"></label>
  </p>
</form>
<div class="lead-chat-nudge" id="leadChatNudge" role="status" aria-live="polite">
  Want a quick fence estimate?
  <button type="button" id="leadChatNudgeBtn">Open chat</button>
</div>
<button type="button" class="lead-chat-toggle" id="leadChatToggle" aria-label="Open chat" aria-expanded="false" aria-controls="leadChatPanel">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>
<div class="lead-chat-backdrop" id="leadChatBackdrop" hidden></div>
<section class="lead-chat-panel" id="leadChatPanel" role="dialog" aria-labelledby="leadChatTitle" aria-modal="true" hidden>
  <header class="lead-chat-header">
    <div>
      <h2 id="leadChatTitle">Twin Rivers Assistant</h2>
      <span>Usually replies instantly</span>
    </div>
    <button type="button" class="lead-chat-close" id="leadChatClose" aria-label="Close chat">×</button>
  </header>
  <div class="lead-chat-messages" id="leadChatMessages" role="log" aria-live="polite" aria-relevant="additions"></div>
  <div class="lead-chat-typing" id="leadChatTyping" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
  <div class="lead-chat-options" id="leadChatOptions" hidden></div>
  <p class="lead-chat-status" id="leadChatStatus"></p>
  <div class="lead-chat-input-row">
    <input type="text" id="leadChatInput" placeholder="Type your message…" autocomplete="section-chat" enterkeyhint="send">
    <button type="button" class="lead-chat-send" id="leadChatSend">Send</button>
  </div>
</section>
<script src="../assets/lead-chat.js" defer></script>
<!-- twinrivers-lead-chat:body-end -->
</body>
</html>
