[build]
  publish = "."

# Netlify serves 404.html automatically for missing URLs (no SPA catch-all).

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/property-improvement/fence-repair"
  to = "/fence-repair/"
  status = 301
  force = false

